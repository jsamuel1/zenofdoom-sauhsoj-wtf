<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zen Word of Doom</title>
<meta name="description" content="A meditative word puzzle with a dark secret. Spin letters, build words, and watch serene Zen scenes slowly reveal the Doom-like creatures hidden within.">
<style>
  :root { color-scheme: dark; }
  body {
    background: radial-gradient(ellipse at top, #1a1410 0%, #0b0d10 60%);
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.02em;
  }
  h1 .doom { color: #c0392b; }
  p.tagline {
    color: #a8a8a8;
    max-width: 42ch;
    margin: 1em auto 2.5em;
    font-size: 1.05rem;
  }
  .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  a.link {
    color: #8fb8ff;
    text-decoration: none;
    align-self: center;
    font-size: 0.95rem;
  }
  footer {
    position: absolute;
    bottom: 24px;
    color: #555;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<h1>Zen Word <span class="doom">of Doom</span></h1>
<p class="tagline">Calm on the surface. Something is watching underneath.
A meditative word puzzle for iPhone — spin letters, build words, and
slowly reveal the Doom-like creature hidden in every serene scene.</p>

<div class="links">
  <a class="link" href="/privacy">Privacy Policy</a>
</div>

<footer>Zen Word of Doom — a game by sauhsoj</footer>

</body>
</html>
